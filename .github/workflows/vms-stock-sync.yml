name: VMS Stock Sync

on:
  schedule:
    # รันทุกวัน เวลา 00:05 น. ไทย (17:05 UTC วันก่อน)
    - cron: "5 17 * * *"
  workflow_dispatch:  # กดรันมือได้

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests supabase

      - name: Sync Machine Stock
        env:
          VMS_USERNAME:         ${{ secrets.VMS_USERNAME }}
          VMS_PASSWORD:         ${{ secrets.VMS_PASSWORD }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python deploy/scraper/vms_stock_sync.py
