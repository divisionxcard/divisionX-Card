name: VMS Daily Sync

on:
  schedule:
    # รันทุกวัน เวลา 00:00 น. เวลาไทย (UTC+7 → 17:00 UTC วันก่อน)
    - cron: "0 17 * * *"
  workflow_dispatch:  # กดรันมือได้จาก GitHub Actions
    inputs:
      days:
        description: "จำนวนวันย้อนหลัง (default: 1 = เมื่อวาน)"
        required: false
        default: "1"
      from_date:
        description: "วันเริ่มต้น (YYYY-MM-DD) สำหรับ backfill"
        required: false
      to_date:
        description: "วันสิ้นสุด (YYYY-MM-DD) สำหรับ backfill"
        required: false

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests supabase pandas openpyxl

      - name: Run VMS Sales Sync (API first, fallback to Playwright)
        env:
          VMS_URL:              ${{ secrets.VMS_URL }}
          VMS_USERNAME:         ${{ secrets.VMS_USERNAME }}
          VMS_PASSWORD:         ${{ secrets.VMS_PASSWORD }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # ใช้ env vars แทน inline ${{ }} เพื่อกัน shell substitution edge cases
          IN_DAYS:      ${{ inputs.days }}
          IN_FROM_DATE: ${{ inputs.from_date }}
          IN_TO_DATE:   ${{ inputs.to_date }}
        run: |
          # Build args as bash array (รองรับช่องว่าง/อักขระพิเศษ + ป้องกัน positional leak)
          ARGS=()
          if [ -n "$IN_FROM_DATE" ] && [ -n "$IN_TO_DATE" ]; then
            ARGS+=(--from-date "$IN_FROM_DATE" --to-date "$IN_TO_DATE")
            echo "🗓  Backfill: $IN_FROM_DATE → $IN_TO_DATE"
          elif [ -n "$IN_DAYS" ]; then
            ARGS+=(--days "$IN_DAYS")
            echo "📅 Days back: $IN_DAYS"
          else
            echo "📅 Default: --days 1"
          fi
          echo "🚀 ลอง API ก่อน..."
          python deploy/scraper/vms_sales_api.py "${ARGS[@]}" || {
            echo "⚠️ API ไม่สำเร็จ — fallback ไป Playwright..."
            pip install playwright && playwright install --with-deps chromium
            python deploy/scraper/vms_scraper.py "${ARGS[@]}"
          }

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          if-no-files-found: ignore
