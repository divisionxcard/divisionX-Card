name: VMS Daily Sync

on:
  schedule:
    # รอบที่ 1: เที่ยงคืน เวลาไทย (00:00 ICT = 17:00 UTC วันก่อน)
    - cron: "0 17 * * *"
    # รอบที่ 2: 7 โมงเช้า เวลาไทย (07:00 ICT = 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:  # กดรันมือได้จาก GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r deploy/scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Run VMS Scraper
        env:
          VMS_URL:              ${{ secrets.VMS_URL }}
          VMS_USERNAME:         ${{ secrets.VMS_USERNAME }}
          VMS_PASSWORD:         ${{ secrets.VMS_PASSWORD }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python deploy/scraper/vms_scraper.py

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          if-no-files-found: ignore
